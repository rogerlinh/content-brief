name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify critical files exist
        run: |
          echo "=== Checking critical files ==="
          ls -la app.py
          ls -la requirements.txt
          ls -la .streamlit/config.toml || echo "No config.toml"
          echo "=== Modules ==="
          ls modules/

      - name: Run syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile main_generator.py
          python -m py_compile worker.py
          python -m py_compile modules/koray_analyzer.py
          python -m py_compile modules/content_brief_builder.py
          python -m py_compile modules/markdown_exporter.py
          python -m py_compile modules/project_manager.py
          python -m py_compile modules/article_writer.py
          python -m py_compile modules/intent.py
          python -m py_compile modules/llm_utils.py
          python -m py_compile modules/prompts/__init__.py
          python -m py_compile modules/prompts/koray_core_rules.py
          echo "All syntax checks passed"

      - name: Verify imports work
        run: |
          python -c "
            from modules.intent import detect_intent, normalize_intent, get_h2_minimum
            from modules.llm_utils import call_llm_with_retry, LLM_DEFAULTS
            from modules.prompts.koray_core_rules import KORAY_8_RULES
            print('All imports OK')
          "
